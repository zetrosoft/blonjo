
services:
  # Database PostgreSQL (+ pgvector)
  sajen-db:
    container_name: sajen_postgres_db
    image: ankane/pgvector:latest
    platform: linux/arm64
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - sajen_postgres_data:/var/lib/postgresql/data
    networks:
      - sajen_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Task Queue
  sajen-redis:
    container_name: sajen_redis_cache
    image: redis:alpine
    platform: linux/arm64
    networks:
      - sajen_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Core API Engine (FastAPI)
  sajen-api:
    container_name: sajen_backend_api
    build:
      context: ./sajen
    platform: linux/arm64
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - OLLAMA_HOST=${OLLAMA_HOST}
    depends_on:
      sajen-db:
        condition: service_healthy
      sajen-redis:
        condition: service_healthy
    networks:
      - sajen_net
    volumes:
      - ./sajen:/app
      - uploads_data:/app/uploads
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8005", "--reload"]
    restart: unless-stopped

  # Agentic Worker (Celery, Ollama, Bizeto WA Hub)
  sajen-worker:
    container_name: sajen_agentic_worker
    build:
      context: ./sajen
    platform: linux/arm64
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - OLLAMA_HOST=${OLLAMA_HOST}
    depends_on:
      sajen-api:
        condition: service_started
      sajen-redis:
        condition: service_healthy
    networks:
      - sajen_net
    volumes:
      - ./sajen:/app
      - uploads_data:/app/uploads
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "--pool=threads", "--concurrency=2"]
    restart: unless-stopped

  # Frontend Dashboard Admin & Kasir (Bun Engine)
  blonjo-ui:
    container_name: blonjo_frontend
    build:
      context: ./blonjo
    platform: linux/arm64
    ports:
      - "7500:7500"
    volumes:
      - ./blonjo:/app
      - /app/node_modules
    networks:
      - sajen_net
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: ["pnpm", "run", "dev", "--host", "0.0.0.0", "--port", "7500"]
    restart: unless-stopped

networks:
  sajen_net:
    driver: bridge

volumes:
  sajen_postgres_data:
  uploads_data:
